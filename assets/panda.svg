<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="130" viewBox="0 0 120 130" role="img" aria-label="Cute panda with bamboo">
  <!-- soft ground shadow -->
  <ellipse cx="60" cy="122" rx="34" ry="6" fill="#b8c0cc" opacity="0.35"/>

  <!-- bamboo (behind paws) -->
  <g transform="rotate(-28 78 58)">
    <rect x="74" y="18" width="8" height="72" rx="4" fill="#6ecf73"/>
    <line x1="78" y1="28" x2="78" y2="88" stroke="#4fa855" stroke-width="1.2" opacity="0.55"/>
    <line x1="78" y1="42" x2="78" y2="88" stroke="#4fa855" stroke-width="1.2" opacity="0.55"/>
    <line x1="78" y1="56" x2="78" y2="88" stroke="#4fa855" stroke-width="1.2" opacity="0.55"/>
    <line x1="78" y1="70" x2="78" y2="88" stroke="#4fa855" stroke-width="1.2" opacity="0.55"/>
    <ellipse cx="78" cy="16" rx="10" ry="5" fill="#58b85d" transform="rotate(-18 78 16)"/>
    <path d="M72 20 Q66 10 60 14 Q68 18 72 24 Z" fill="#58b85d"/>
    <path d="M84 18 Q92 8 96 14 Q88 18 84 24 Z" fill="#58b85d"/>
  </g>

  <!-- legs -->
  <ellipse cx="42" cy="104" rx="14" ry="11" fill="#2d2d2d"/>
  <ellipse cx="78" cy="104" rx="14" ry="11" fill="#2d2d2d"/>
  <!-- paw pads -->
  <circle cx="42" cy="106" r="2.2" fill="#8a93a3"/>
  <circle cx="37" cy="103" r="1.6" fill="#8a93a3"/>
  <circle cx="47" cy="103" r="1.6" fill="#8a93a3"/>
  <circle cx="78" cy="106" r="2.2" fill="#8a93a3"/>
  <circle cx="73" cy="103" r="1.6" fill="#8a93a3"/>
  <circle cx="83" cy="103" r="1.6" fill="#8a93a3"/>

  <!-- body -->
  <ellipse cx="60" cy="88" rx="28" ry="24" fill="#ffffff" stroke="#1f1f1f" stroke-width="2.2"/>

  <!-- arms -->
  <ellipse cx="34" cy="78" rx="11" ry="14" fill="#2d2d2d" transform="rotate(18 34 78)"/>
  <ellipse cx="86" cy="78" rx="11" ry="14" fill="#2d2d2d" transform="rotate(-18 86 78)"/>

  <!-- ears -->
  <circle cx="38" cy="28" r="13" fill="#2d2d2d" stroke="#1f1f1f" stroke-width="2"/>
  <circle cx="82" cy="28" r="13" fill="#2d2d2d" stroke="#1f1f1f" stroke-width="2"/>

  <!-- head -->
  <circle cx="60" cy="46" r="30" fill="#ffffff" stroke="#1f1f1f" stroke-width="2.2"/>

  <!-- eye patches -->
  <ellipse cx="48" cy="46" rx="11" ry="12" fill="#2d2d2d" transform="rotate(-8 48 46)"/>
  <ellipse cx="72" cy="46" rx="11" ry="12" fill="#2d2d2d" transform="rotate(8 72 46)"/>

  <!-- eyes -->
  <circle cx="49" cy="45" r="4.2" fill="#ffffff"/>
  <circle cx="71" cy="45" r="4.2" fill="#ffffff"/>
  <circle cx="50" cy="45.5" r="2.2" fill="#1f1f1f"/>
  <circle cx="72" cy="45.5" r="2.2" fill="#1f1f1f"/>
  <circle cx="51" cy="44.2" r="0.9" fill="#ffffff"/>
  <circle cx="73" cy="44.2" r="0.9" fill="#ffffff"/>

  <!-- blush -->
  <ellipse cx="38" cy="54" rx="5.5" ry="3.2" fill="#ffb8c9" opacity="0.65"/>
  <ellipse cx="82" cy="54" rx="5.5" ry="3.2" fill="#ffb8c9" opacity="0.65"/>

  <!-- nose + mouth -->
  <ellipse cx="60" cy="56" rx="3.8" ry="3" fill="#1f1f1f"/>
  <path d="M60 58.2 Q56 62 52 60.5" fill="none" stroke="#1f1f1f" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M60 58.2 Q64 62 68 60.5" fill="none" stroke="#1f1f1f" stroke-width="1.6" stroke-linecap="round"/>
</svg>
