<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YGF_China</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      id="btn-home"
      class="home-btn"
      type="button"
      aria-label="Home"
      title="Back to start"
      hidden
    >
      <svg class="home-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z"
          fill="currentColor"
        />
      </svg>
    </button>

    <main class="stage">
      <!-- ===== Start screen ===== -->
      <section id="screen-start" class="screen is-active">
        <div class="card card--center card--start">
          <img
            class="start-panda"
            src="assets/panda.png"
            alt=""
            aria-hidden="true"
          />
          <p class="eyebrow">YGF · China Quiz</p>
          <h1 class="start-title">
            are u ready to find out how chinese ur brain really is?
          </h1>
          <button id="btn-start" class="btn btn--primary" type="button">
            let's go
          </button>
        </div>
      </section>

      <!-- ===== Question screen ===== -->
      <section id="screen-question" class="screen">
        <div class="card">
          <div class="q-head">
            <span id="progress" class="progress">Q1 / 5</span>
            <span id="category" class="category-tag"></span>
          </div>

          <div class="progress-bar">
            <div id="progress-fill" class="progress-bar__fill"></div>
          </div>

          <h2 id="question-text" class="question-text"></h2>

          <div id="options" class="options" role="listbox" aria-label="Answer choices"></div>

          <!-- Inline correct feedback (hidden until a correct confirm) -->
          <div id="feedback" class="feedback" hidden>
            <p class="feedback__title">Correct!</p>
            <p id="feedback-explanation" class="feedback__explanation"></p>
          </div>

          <div class="q-actions">
            <button id="btn-confirm" class="btn btn--primary" type="button" disabled>
              Confirm
            </button>
            <button id="btn-next" class="btn btn--primary" type="button" hidden>
              Next
            </button>
          </div>
        </div>
      </section>

      <!-- ===== Try Again screen ===== -->
      <section id="screen-tryagain" class="screen">
        <div class="card card--center">
          <div class="tryagain-emoji" aria-hidden="true">🤔</div>
          <h2 id="tryagain-message" class="tryagain-message"></h2>
          <button id="btn-retry" class="btn btn--primary" type="button">
            Try again
          </button>
        </div>
      </section>

      <!-- ===== Completion screen ===== -->
      <section id="screen-complete" class="screen">
        <div class="card card--center">
          <!-- Drop your image at assets/completion.png to replace the placeholder. -->
          <img
            id="completion-image"
            class="completion-image"
            src="assets/completion.png"
            onerror="this.onerror=null;this.src='assets/completion.svg';"
            alt="A fun celebration image"
          />
          <p class="completion-line">you met me at very chinese moment</p>
          <button id="btn-playagain" class="btn btn--primary" type="button">
            Play Again
          </button>
        </div>
      </section>
    </main>

    <script src="questions.js"></script>
    <script src="quiz.js"></script>
  </body>
</html>
